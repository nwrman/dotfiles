# ----------------------------
# General settings
# ----------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -g escape-time 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-position top
set -g detach-on-destroy off

# Intuitive split keybindings (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Session management (sesh + television)
bind T display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' -B tv sesh
bind L run-shell "sesh last"

# Fast window switching (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-Tab last-window

# ----------------------------
# Plugins (TPM)
# ----------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# ----------------------------
# Catppuccin theme
# ----------------------------
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Status bar layout
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Show user and host only when connected via SSH
if-shell '[ -n "$SSH_CONNECTION" ]' {
  set -g @catppuccin_user_text " #(whoami)@#H"
  set -ag status-right "#{E:@catppuccin_status_user}"
}

# ----------------------------
# Plugin settings
# ----------------------------

# ----------------------------
# TPM bootstrap (auto-install on fresh machines)
# ----------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
set -g extended-keys on
set -g extended-keys-format csi-u
